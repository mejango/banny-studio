name: BannyStudio
options:
  bundleIdPrefix: com.banny
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

packages:
  BannyStudioKit:
    path: ..

settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CURRENT_PROJECT_VERSION: 13
    MARKETING_VERSION: 1.4.0
    DEVELOPMENT_TEAM: SY2W527QJA
    CODE_SIGN_STYLE: Automatic
    # Public installed-app identifier, injected by the release configuration.
    # Native apps use PKCE and must not embed a confidential client secret.
    BANNY_YOUTUBE_OAUTH_CLIENT_ID: ""
    # Google shows this as the "iOS URL scheme" for the native OAuth client.
    # Release builds should override it with the reversed OAuth client ID.
    BANNY_YOUTUBE_OAUTH_CALLBACK_SCHEME: com.banny.BannyStudio.youtube
    BANNY_YOUTUBE_OAUTH_REDIRECT_URI: $(BANNY_YOUTUBE_OAUTH_CALLBACK_SCHEME):/oauth2redirect

targets:
  BannyStudio:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Sources
      - path: Resources/BannyAssets
        type: folder
        buildPhase: resources
      - path: Resources/Backdrops
        type: folder
        buildPhase: resources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: BannyStudioKit
        product: BannyCore
      - package: BannyStudioKit
        product: BannyRender
      - package: BannyStudioKit
        product: BannyMedia
    info:
      path: Info.plist
      properties:
        CFBundleName: Banny Studio
        CFBundleDisplayName: Banny Studio
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "© 2026 jango"
        LSApplicationCategoryType: public.app-category.graphics-design
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportsDocumentBrowser: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: Record narration and voices directly onto a track.
        BannyYouTubeOAuthClientID: $(BANNY_YOUTUBE_OAUTH_CLIENT_ID)
        BannyYouTubeOAuthRedirectURI: $(BANNY_YOUTUBE_OAUTH_REDIRECT_URI)
        CFBundleURLTypes:
          - CFBundleURLName: Banny Studio YouTube OAuth
            CFBundleURLSchemes:
              - $(BANNY_YOUTUBE_OAUTH_CALLBACK_SCHEME)
        NSUbiquitousContainers:
          iCloud.com.banny.BannyStudio:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: Banny Studio
            NSUbiquitousContainerSupportedFolderLevels: Any
        CFBundleDocumentTypes:
          - CFBundleTypeName: Banny Show
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes: [com.banny.show]
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.banny.show
            UTTypeDescription: Banny Show
            UTTypeConformsTo: [com.apple.package]
            UTTypeTagSpecification:
              public.filename-extension: [bs, bannyshow]
          - UTTypeIdentifier: com.banny.studio-track
            UTTypeDescription: Banny Studio Track
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [bannytrack]
    scheme:
      testTargets: [BannyStudioUITests]
    entitlements:
      path: BannyStudio.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
        # iCloud Documents sync — uncomment after accepting the latest Apple
        # Developer Program License Agreement at developer.apple.com (provisioning
        # fails with "PLA Update available" until then):
        # com.apple.developer.icloud-services: [CloudDocuments]
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.com.banny.BannyStudio
        # com.apple.developer.ubiquity-container-identifiers:
        #   - iCloud.com.banny.BannyStudio

  BannyStudioUITests:
    type: bundle.ui-testing
    supportedDestinations: [macOS, iOS]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: UITests
    dependencies:
      - target: BannyStudio
