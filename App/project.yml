name: BannyStudio
options:
  bundleIdPrefix: com.banny
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

packages:
  BannyStudioKit:
    path: ..

settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: NO
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: SY2W527QJA
    CODE_SIGN_STYLE: Automatic

targets:
  BannyStudio:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Sources
    resources:
      - path: ../Assets/catalog.json
      - path: ../Assets/png
        type: folder
    dependencies:
      - package: BannyStudioKit
        product: BannyCore
      - package: BannyStudioKit
        product: BannyRender
    info:
      path: Info.plist
      properties:
        CFBundleName: Banny Studio
        CFBundleDisplayName: Banny Studio
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: ""
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: Record narration and voices directly onto a track.
        CFBundleDocumentTypes:
          - CFBundleTypeName: Banny Show
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes: [com.banny.show]
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.banny.show
            UTTypeDescription: Banny Show
            UTTypeConformsTo: [com.apple.package]
            UTTypeTagSpecification:
              public.filename-extension: [bannyshow]
    entitlements:
      path: BannyStudio.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.device.audio-input: true
