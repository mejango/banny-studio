name: BannyStudio
options:
  bundleIdPrefix: com.banny
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

packages:
  BannyStudioKit:
    path: ..

settings:
  base:
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: SY2W527QJA
    CODE_SIGN_STYLE: Automatic

targets:
  BannyStudio:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Sources
      - path: Resources/BannyAssets
        type: folder
        buildPhase: resources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: BannyStudioKit
        product: BannyCore
      - package: BannyStudioKit
        product: BannyRender
      - package: BannyStudioKit
        product: BannyMedia
    info:
      path: Info.plist
      properties:
        CFBundleName: Banny Studio
        CFBundleDisplayName: Banny Studio
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: ""
        UILaunchScreen: {}
        UISupportsDocumentBrowser: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: Record narration and voices directly onto a track.
        NSUbiquitousContainers:
          iCloud.com.banny.BannyStudio:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: Banny Studio
            NSUbiquitousContainerSupportedFolderLevels: Any
        CFBundleDocumentTypes:
          - CFBundleTypeName: Banny Show
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes: [com.banny.show]
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.banny.show
            UTTypeDescription: Banny Show
            UTTypeConformsTo: [com.apple.package]
            UTTypeTagSpecification:
              public.filename-extension: [bannyshow]
    scheme:
      testTargets: [BannyStudioUITests]
    entitlements:
      path: BannyStudio.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.device.audio-input: true
        # iCloud Documents sync — uncomment after accepting the latest Apple
        # Developer Program License Agreement at developer.apple.com (provisioning
        # fails with "PLA Update available" until then):
        # com.apple.developer.icloud-services: [CloudDocuments]
        # com.apple.developer.icloud-container-identifiers:
        #   - iCloud.com.banny.BannyStudio
        # com.apple.developer.ubiquity-container-identifiers:
        #   - iCloud.com.banny.BannyStudio

  BannyStudioUITests:
    type: bundle.ui-testing
    supportedDestinations: [macOS, iOS]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: UITests
    dependencies:
      - target: BannyStudio
